<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Timer Overlay</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    /* Container overlay card */
    .overlay-card {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      pointer-events: none;
      z-index: 9999;
      background: transparent;
    }

    /* Foto profil bulat */
    .avatar-wrap {
      position: relative;
      width: 64px;
      height: 64px;
    }
    .avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      background: #ddd;
      border: 2px solid rgba(0,0,0,0.1);
    }
    .crown {
      position: absolute;
      top: -6px;
      left: 50%;
      transform: translateX(-50%) rotate(-6deg);
      font-size: 16px;
      line-height: 1;
    }

    /* Username */
    .username {
      color: #fff;
      font-weight: 600;
      font-size: 14px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.4);
      letter-spacing: 0.2px;
      min-height: 18px;
    }
    .username.yellow { color: #ffd966; }

    /* Gift display */
    .gift-display {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: #fff;
    }
    .gift-icon { font-size: 18px; }
    .gift-count {
      font-weight: 700;
      font-family: inherit;
      animation: pop-in 0.25s ease;
    }
    @keyframes pop-in {
      0% { transform: scale(0.8); opacity: 0; }
      60% { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1); }
    }

    /* Timer overlay */
    .overlay-timer {
      font-weight: 700;
      font-size: 42px;
      color: #ffd400;
      letter-spacing: 2px;
      text-shadow: 0 2px 6px rgba(0,0,0,0.5);
    }
    .overlay-timer.warn { color: #ffd400; }
    .overlay-timer.critical { color: #ff4d4d; }
    .timer-digits { display: inline-block; }

    /* Gift cues keep their position relative to timer */
    .overlay-timer { position: relative; }
    .reset-cue, .add-cue {
      position: absolute;
      top: -6px;
      right: -6px;
      z-index: 2;
    }

    /* Bar bawah / kolam */
    .overlay-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 28px;
      background: rgba(0,0,0,0.6);
      border-top: 1px solid rgba(255, 215, 0, 0.8);
      backdrop-filter: blur(2px);
      pointer-events: none;
      z-index: 9998;
    }
  </style>
</head>
<body class="overlay-body">
  <div class="overlay">
    <div id="overlay-card" class="overlay-card">
      <div class="avatar-wrap">
        <img id="avatar" class="avatar" src="" alt="Profil" />
        <span class="crown" aria-label="crown">👑</span>
      </div>

      <div id="username" class="username">Nama Pengguna</div>

      <div class="gift-display">
        <div id="overlay-timer" class="overlay-timer timer-display" aria-label="timer">
          <div id="resetCue" class="reset-cue" aria-live="polite">RESET!</div>
          <div id="addCue" class="add-cue" aria-live="polite">+5s</div>
          <span id="timer-digits" class="timer-digits">20</span>
        </div>
        <span id="gift-count" class="gift-count">1</span>
      </div>
    </div>
    <div id="overlay-bar" class="overlay-bar" aria-hidden="true"></div>
  </div>

  <script src="/script.js"></script>
</body>
</html>
